# Trigger rebuild
# Basic site configuration
baseURL = 'https://weijie-zhu.github.io/'
languageCode = 'en-us'
title = "Ju"
[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMSFULL"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[outputFormats.LLMS]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.LLMSFULL]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

[params]
  siteDescription = "Personal website of Weijie Zhu: photography, projects, and writing."
  defaultImage = "images/home.jpg"
  author = "Weijie Zhu"
  defaultLang = "en"
  aiPolicyUrl = "/ai-policy/"

# Navigation menu items
[menu]
  [[menu.main]]
    name = "Home"      # Display name
    url = "/"          # URL to link to
    weight = 1         # Order in menu (lowest number appears first)
  
  [[menu.main]]
    name = "Gallery"
    url = "/gallery/"
    weight = 4
  
  [[menu.main]]
    name = "Projects"
    url = "/project/"
    weight = 2

  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 3
  
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5

[params.social]
  # Icons will be displayed in the order listed here
  [[params.social.list]]
    icon = "facebook"
    url = "https://facebook.com/teruzz77"
  [[params.social.list]]
    icon = "instagram"
    url = "https://instagram.com/teruzz77"
  [[params.social.list]]
    icon = "youtube"
    url = "https://www.youtube.com/@JUJU-lh1ov"
  [[params.social.list]]
    icon = "bilibili"
    url = "https://space.bilibili.com/142718963/upload/video"

[markup]
  [markup.highlight]
    style = "github"
    noClasses = true
    lineNos = false
    codeFences = true
    guessSyntax = false
